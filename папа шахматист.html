<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>картинки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oi&family=Rubik+Doodle+Shadow&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg, #020111 0%, #050518 50%, #191970 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s infinite ease-in-out alternate;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden; 
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .star-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            opacity: 0.8;
            animation: twinkleMain 3s infinite ease-in-out alternate;
        }

        @keyframes twinkleMain {
            0% { transform: scale(0.5); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 1; background-color: yellow; box-shadow: 0 0 10px yellow; }
            100% { transform: scale(0.5); opacity: 0.2; }
        }

        .star:nth-child(1) { top: 48%; left: 10%; animation-delay: 0.1s; }
        .star:nth-child(2) { top: 55%; left: 18%; animation-delay: 0.3s; }
        .star:nth-child(3) { top: 42%; left: 25%; animation-delay: 0.5s; }
        .star:nth-child(4) { top: 35%; left: 40%; animation-delay: 0.7s; }
        .star:nth-child(5) { top: 65%; left: 45%; animation-delay: 0.9s; }
        .star:nth-child(6) { top: 35%; left: 60%; animation-delay: 0.2s; }
        .star:nth-child(7) { top: 65%; left: 70%; animation-delay: 0.4s; }
        .star:nth-child(8) { top: 45%; left: 82%; animation-delay: 0.6s; }
        .star:nth-child(9) { top: 55%; left: 90%; animation-delay: 0.8s; }

        .star-background {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: twinkleBackground 4s infinite ease-in-out alternate;
        }

        @keyframes twinkleBackground {
            0% { opacity: 0.1; }
            100% { opacity: 0.6; }
        }

        .star-background:nth-child(10) { top: 10%; left: 15%; }
        .star-background:nth-child(11) { top: 20%; left: 80%; }
        .star-background:nth-child(12) { top: 80%; left: 10%; }
        .star-background:nth-child(13) { top: 90%; left: 70%; }
        .star-background:nth-child(14) { top: 5%;  left: 50%; }
        .star-background:nth-child(15) { top: 75%; left: 30%; }
        .star-background:nth-child(16) { top: 15%; left: 35%; }
        .star-background:nth-child(17) { top: 85%; left: 90%; }
        .star-background:nth-child(18) { top: 40%; left: 5%; }
        .star-background:nth-child(19) { top: 60%; left: 95%; }

        .title-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 999;
            transform: translate(-50%, -50%);
            animation: fadeInFromDeep 2s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeInFromDeep {
            0% {
                opacity: 0;
                transform: translate(-50%, 30%);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        h1 {
            font-family: "Rubik Doodle Shadow", system-ui;
            font-weight: 400;
            text-align: center;
            color: #fff;
            margin: 0;
            white-space: nowrap;
            font-size: 75px; 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); 
            
            -webkit-font-smoothing: antialiased;
            transform: translateZ(0) scale(1);
            
            /* Делаем быстро и упруго (0.3 секунды), чтобы браузер не успевал тупить */
            transition: transform 0.3s ease-out, 
                        color 0.3s ease-out, 
                        text-shadow 0.3s ease-out;
            cursor: pointer;
        }

        h1:hover {
            /* Увеличиваем не сильно, чтобы масштаб был аккуратным */
            transform: translateZ(0) scale(1.1);
            color: #fffde7; 
            text-shadow: 
                0 0 25px #fff,
                0 0 50px #ffeb3b, 
                0 0 75px #00e5ff;
        }
    </style>
</head>
<body>
    <div class="star-container">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>

        <div class="star-background"></div>
        <div class="star-background"></div>
        <div class="star-background"></div>
        <div class="star-background"></div>
        <div class="star-background"></div>
        <div class="star-background"></div>
        <div class="star-background"></div>
        <div class="star-background"></div>
        <div class="star-background"></div>
        <div class="star-background"></div>
    </div>

    <div class="title-wrapper">
        <a href="https://lichess.org/@/M-borrr" target="_blank" style="text-decoration: none;">
            <h1>ПАПА ШАХМАТИСТ</h1>
        </a>
    </div>
</body>
</html>
